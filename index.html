<!DOCTYPE html>
<html>
<head>
    <title>Food Bill Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h1>🍔 Food Bill Predictor</h1>

    <form action="/predict" method="post">

        <input type="number" name="num_items" placeholder="Number of Items" required>
        <input type="number" step="0.01" name="avg_item_price" placeholder="Avg Item Price" required>
        <input type="number" step="0.01" name="discount_percent" placeholder="Discount %" required>
        <input type="number" step="0.01" name="delivery_distance_km" placeholder="Distance (km)" required>
        <input type="number" step="0.01" name="delivery_rating" placeholder="Delivery Rating" required>
        <input type="number" name="customer_age" placeholder="Customer Age" required>
        <input type="number" name="num_previous_orders" placeholder="Previous Orders" required>

        <!-- Dropdowns -->
        <select name="cuisine_type">
            {% for item in options['cuisine_type'] %}
            <option value="{{ item }}">{{ item }}</option>
            {% endfor %}
        </select>

        <select name="meal_time">
            {% for item in options['meal_time'] %}
            <option value="{{ item }}">{{ item }}</option>
            {% endfor %}
        </select>

        <select name="customer_gender">
            {% for item in options['customer_gender'] %}
            <option value="{{ item }}">{{ item }}</option>
            {% endfor %}
        </select>

        <select name="weekend">
            {% for item in options['weekend'] %}
            <option value="{{ item }}">{{ item }}</option>
            {% endfor %}
        </select>

        <button type="submit">Predict Bill</button>
    </form>

    {% if prediction %}
    <div class="result">
        💰 Estimated Total Bill: ₹ {{ prediction }}
    </div>
    {% endif %}

</div>

</body>
</html>
